<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Circled Cross Lodge — Temple</title>

<style>
body {
background:#000;
color:#eee;
font-family:Georgia;
text-align:center;
margin:0;
}

h1 {
color:gold;
text-shadow:0 0 15px gold;
}

button {
padding:10px;
margin:5px;
background:#111;
color:#fff;
border:1px solid gold;
}

#tree {
width:100%;
max-width:600px;
display:block;
margin:auto;
}

.line {stroke:#666;stroke-width:2;}
.glow {stroke:gold !important;stroke-width:4;}

.node {cursor:pointer;stroke:black;stroke-width:1;}

#info {
background:#111;
padding:12px;
min-height:140px;
border-top:1px solid gold;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:12px;
}

.card {
background:#111;
border:1px solid gold;
padding:12px;
cursor:pointer;
}

.card:hover {box-shadow:0 0 10px gold;}

.rune {font-size:40px;color:gold;}

#tarotPage,#runesPage,#quizPage {display:none;}
</style>
</head>

<body>

<h1>Circled Cross Lodge — Temple</h1>

<button onclick="showPage('treePage')">Tree</button>
<button onclick="showPage('tarotPage')">Tarot</button>
<button onclick="showPage('runesPage')">Runes</button>
<button onclick="startQuiz()">Quiz</button>

<div id="treePage">
<svg id="tree" viewBox="0 0 600 820"></svg>
<div id="info">Tap a sphere or path</div>
</div>

<div id="tarotPage"><div id="tarot" class="grid"></div></div>
<div id="runesPage"><div id="runes" class="grid"></div></div>

<div id="quizPage">
<h2>Initiation Quiz</h2>
<div id="q"></div>
<div id="answers"></div>
<div id="score"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const svg = document.getElementById("tree");
const info = document.getElementById("info");
const tarotDiv = document.getElementById("tarot");
const runesDiv = document.getElementById("runes");
const qDiv = document.getElementById("q");
const answersDiv = document.getElementById("answers");
const scoreDiv = document.getElementById("score");

// POSITIONS (CORRECT TREE)
const pos = [
[300,60],[150,180],[450,180],
[150,340],[450,340],[300,340],
[180,540],[420,540],
[300,680],[300,780]
];

// YOUR FULL SYSTEM
const seph = [
["Kether","Eheieh","Metatron","#ffffff","Crown","Pure being beyond existence."],
["Chokmah","Yah","Raziel","#888888","Left neck","Dynamic creative force."],
["Binah","Jehovah Elohim","Tzaphkiel","#000000","Right neck","Structure and form."],
["Chesed","El","Tzadkiel","#0044ff","Left shoulder","Mercy and expansion."],
["Geburah","Elohim Gibor","Kamael","#cc0000","Right shoulder","Discipline and power."],
["Tiphereth","Jehovah Eloah","Michael","#ffd700","Heart","Balance and higher self."],
["Netzach","Jehovah Sabaoth","Haniel","#00aa44","Left hip","Emotion and desire."],
["Hod","Elohim Tzabaoth","Raphael","#ff8800","Right hip","Intellect and logic."],
["Yesod","Shaddai El Chai","Gabriel","#8844ff","Pelvis","Subconscious realm."],
["Malkuth","Adonai Ha-Aretz","Sandalphon","#665544","Feet","Material world."]
];

// PATHS + TAROT INDEX
const tarotNames=[
"Fool","Magician","High Priestess","Empress","Emperor","Hierophant",
"Lovers","Chariot","Strength","Hermit","Wheel","Justice",
"Hanged Man","Death","Temperance","Devil","Tower","Star",
"Moon","Sun","Judgement","World"
];

const paths=[
[0,1,"א",0],[0,2,"ב",1],[1,2,"ג",2],[1,3,"ד",3],
[2,4,"ה",4],[3,5,"ו",5],[4,5,"ז",6],[1,5,"ח",7],
[2,5,"ט",8],[3,4,"י",9],[5,6,"כ",10],[5,7,"ל",11],
[6,7,"מ",12],[6,8,"נ",13],[7,8,"ס",14],[8,9,"ע",15],
[3,6,"פ",16],[4,7,"צ",17],[5,8,"ק",18],[2,6,"ר",19],
[1,7,"ש",20],[0,5,"ת",21]
];

let lines=[];

// DRAW PATHS
paths.forEach((p,i)=>{
let l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",pos[p[0]][0]);
l.setAttribute("y1",pos[p[0]][1]);
l.setAttribute("x2",pos[p[1]][0]);
l.setAttribute("y2",pos[p[1]][1]);
l.setAttribute("class","line");

l.onclick=()=>{
lines.forEach(x=>x.classList.remove("glow"));
l.classList.add("glow");
info.innerHTML=`Path ${p[2]}<br>${tarotNames[p[3]]}`;
};

svg.appendChild(l);
lines.push(l);

// HEBREW LETTER
let t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",(pos[p[0]][0]+pos[p[1]][0])/2);
t.setAttribute("y",(pos[p[0]][1]+pos[p[1]][1])/2);
t.setAttribute("fill","white");
t.textContent=p[2];
svg.appendChild(t);
});

// DRAW SEPHIROTH
pos.forEach((p,i)=>{
let c=document.createElementNS("http://www.w3.org/2000/svg","circle");
c.setAttribute("cx",p[0]);
c.setAttribute("cy",p[1]);
c.setAttribute("r",26);
c.setAttribute("fill",seph[i][3]);
c.setAttribute("class","node");

c.onclick=()=>{
let d=seph[i];
info.innerHTML=`
<b>${d[0]}</b><br><br>
Divine: ${d[1]}<br>
Archangel: ${d[2]}<br>
Body: ${d[4]}<br><br>
${d[5]}
`;
};

svg.appendChild(c);
});

// TAROT CARDS
tarotNames.forEach((t,i)=>{
let c=document.createElement("div");
c.className="card";

c.innerHTML=`
<div style="height:160px;border:1px solid gold;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:10px;">
${t}
</div>
<h3>${t}</h3>
<p>Archetypal force on the Tree of Life.</p>
`;

c.onclick=()=>{
showPage("treePage");
lines.forEach(x=>x.classList.remove("glow"));
if(lines[i]) lines[i].classList.add("glow");
};

tarotDiv.appendChild(c);
});

// RUNES
const runes=[
["ᚠ","Fehu","Wealth and energy flow"],
["ᚢ","Uruz","Strength and vitality"],
["ᚦ","Thurisaz","Conflict and protection"],
["ᚨ","Ansuz","Wisdom and communication"],
["ᚱ","Raidho","Journey and movement"],
["ᚲ","Kenaz","Knowledge and illumination"],
["ᛉ","Algiz","Protection and higher guidance"],
["ᛞ","Dagaz","Breakthrough and awakening"]
];

runes.forEach(r=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<div class="rune">${r[0]}</div>
<h3>${r[1]}</h3>
<p>${r[2]}</p>`;
runesDiv.appendChild(c);
});

// QUIZ
let score=0;

window.startQuiz=function(){
showPage("quizPage");
score=0;
nextQ();
};

function nextQ(){
let correct=tarotNames[Math.floor(Math.random()*tarotNames.length)];
qDiv.innerHTML=`Which card is: <b>${correct}</b>?`;

let opts=[correct,...tarotNames.sort(()=>Math.random()-0.5).slice(0,3)];

answersDiv.innerHTML="";
opts.forEach(o=>{
let b=document.createElement("button");
b.textContent=o;
b.onclick=function(){
if(o===correct) score++;
scoreDiv.textContent="Score: "+score;
nextQ();
};
answersDiv.appendChild(b);
});
}

// NAV
window.showPage=function(p){
["treePage","tarotPage","runesPage","quizPage"].forEach(id=>{
document.getElementById(id).style.display="none";
});
document.getElementById(p).style.display="block";
};

});
</script>

</body>
</html>
